version: '3.8'

services:
  api:
    container_name: acordoja-api
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    container_name: acordoja-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "acordoja"
  redis:
    image: redis:7
    container_name: acordoja-redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: acordoja-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@acordoja.com
      PGADMIN_DEFAULT_PASSWORD: acordoja
    depends_on:
      - db

  loki:
    image: grafana/loki:3.0.0
    container_name: acordoja-loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: acordoja-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: acordoja-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - loki

volumes:
  pgdata:
