global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Flask app metrics (via OpenTelemetry)
  - job_name: 'acordo-ja-api'
    static_configs:
      - targets: ['api:8888']  # Porta de métricas OTLP