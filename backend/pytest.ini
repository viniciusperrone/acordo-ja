[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

markers =
    unit: Unit tests
    integration: Testes de integração
    api: Integration Tests
    slow: Slow Tests
    db: Tests that use database
    tasks: Scheduled task tests

timeout = 300
timeout_method = thread

filterwarnings =
    ignore::DeprecationWarning